name: bloop Build, Sign & Release

on:
  workflow_dispatch:
    inputs:
      public_release:
        description: 'Public Release'
        type: boolean
        required: true
        default: true
      perform_sign:
        description: 'Sign'
        type: boolean
        required: true
        default: true
      perform_release:
        description: 'Release'
        type: boolean
        required: true
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  outputDirectory: ${{ github.workspace}}/app

jobs:
  build:
    permissions:
      contents: read

    name: Build app
    runs-on: windows-latest

    outputs:
      version_stamp: ${{ steps.version-stamp.outputs.version_stamp }}

    steps:
    - name: 'Checkout'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
 
    - name: 'Setup .NET SDK'
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: | 
          10.0.x

    - name: 'Configure Versioning'
      uses: dotnet/nbgv@3cf2d96c2aa00675081b59f401356ac1fb81092f # v0.5.1
      with:
        setAllVars: true
        path: ./bloop

    - name: 'Build x64'
      id: buildx64
      run: dotnet publish bloop -c Release -r win-x64 -p:PublishSingleFile=true --self-contained true -o ${{ env.outputDirectory }}/x64 --property:PublicRelease=${{ inputs.public_release }}

    - name: 'Build arm64'
      id: buildarm
      run: dotnet publish bloop -c Release -r win-arm64 -p:PublishSingleFile=true --self-contained true -o ${{ env.outputDirectory }}/arm64 --property:PublicRelease=${{ inputs.public_release }}

    - name: 'Append Version Stamp to build output'
      id: version-stamp
      run: echo version_stamp=$env:NBGV_SemVer2 | Out-File -FilePath $env:GITHUB_OUTPUT -Append 

    - name: 'Rename exes for Architecture'
      shell: pwsh
      run : |
        Get-ChildItem "app\" "*.exe" -Recurse |
        foreach-object {
            Rename-Item -Path $_.FullName "$($_.BaseName)-$($_.Directory.Name)$($_.Extension)"
        }

    - name: Upload Unsigned Artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: unsigned-executables
        path: |
          ${{ env.outputDirectory }}/**/bloop*.exe
        retention-days: 5

  sign:
    name: Sign app
    needs: build
    runs-on: windows-latest
    if:  ${{ inputs.perform_sign }} 
    environment: codeSign
    permissions:
      contents: read
      id-token: write
    steps:
    - name: 'Get .NET installed versions'
      run: dotnet --info

    - name: 'Install Sign CLI'
      run: dotnet tool install --tool-path ./sign --prerelease sign

    - name: 'Download Build Output'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: unsigned-executables
        path : ${{ env.outputDirectory }}

    - name: Authenticate to Azure
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # 3.0.0
      with:
        allow-no-subscriptions : true
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Sign
      shell: pwsh
      run: >
        ./sign/sign code azure-key-vault
        **/bloop*.exe
        --base-directory ${{ env.outputDirectory }}
        --azure-key-vault-url "${{ secrets.AZURE_KEY_VAULT_URL }}"
        --azure-key-vault-certificate "${{ secrets.AZURE_KEY_VAULT_CERTIFICATE }}"
        --publisher-name "idunno.org"
        --description "Sign bloop.exe"
        --description-url "https://github.com/blowdart/idunno.Bluesky.Utils"

    - name: Upload Signed exes
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: signed-artifacts
        path: |
          ${{ env.outputDirectory }}/**/bloop*.exe
        retention-days: 7

  release:
    name: Release app
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: bloop/${{needs.build.outputs.version_stamp}}

    if: ${{ inputs.perform_release }} 
    steps:

    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Stamping version
      run: |
        echo Stamping release as $tag

    - name: 'Checkout'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Tag Source
      uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1.7.2
      with:
        tag: ${{env.TAG}}

    - name: 'Download Signed Artifacts'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: signed-artifacts
        path : ${{ env.outputDirectory }}

    - name: Create Release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe #v2.6.1
      with:
        fail_on_unmatched_files: true
        files: ${{ env.outputDirectory }}/**/*.exe
        make_latest: true
        name: bloop v${{needs.build.outputs.version_stamp}}
        tag_name: ${{env.TAG}}
