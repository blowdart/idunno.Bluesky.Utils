name: blueskyVideoDownloader Build, Sign & Release

on:
  workflow_dispatch:
    inputs:
      public_release:
        description: 'Public Release'
        type: boolean
        required: true
        default: true
      perform_sign:
        description: 'Sign'
        type: boolean
        required: true
        default: true
      perform_release:
        description: 'Release'
        type: boolean
        required: true
        default: false

env:
  DOTNET_NOLOGO: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  outputDirectory: ${{ github.workspace}}/app

jobs:
  build:
    permissions:
      contents: read

    name: Build Windows app
    runs-on: windows-latest

    outputs:
      version_stamp: ${{ steps.version-stamp.outputs.version_stamp }}

    steps:
    - name: 'Checkout'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
 
    - name: 'Setup .NET SDK'
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: | 
          10.0.x

    - name: 'Configure Versioning'
      uses: dotnet/nbgv@705dad19ab067f12f4e9eeaa60812e01edef5d25 # v0.5.2
      with:
        setAllVars: true
        path: ./BlueskyVideoDownloader

    - name: 'Build windows-x64'
      id: buildx64
      run: dotnet publish BlueskyVideoDownloader -c Release -r win-x64 -p:PublishSingleFile=true --self-contained true -o ${{ env.outputDirectory }}/x64 --property:PublicRelease=${{ inputs.public_release }}

    - name: 'Build windows-arm64'
      id: buildarm
      run: dotnet publish BlueskyVideoDownloader -c Release -r win-arm64 -p:PublishSingleFile=true --self-contained true -o ${{ env.outputDirectory }}/arm64 --property:PublicRelease=${{ inputs.public_release }}

    - name: 'Set Version Stamp'
      id: version-stamp
      run: echo version_stamp=$env:NBGV_SemVer2 | Out-File -FilePath $env:GITHUB_OUTPUT -Append 

    - name: 'Rename Windows exes for Architecture'
      shell: pwsh
      run : |
        Get-ChildItem "app\" "*.exe" -Recurse |
        foreach-object {
            Rename-Item -Path $_.FullName "$($_.BaseName)-$($_.Directory.Name)$($_.Extension)"
        }

    - name: Upload Unsigned Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: unsigned-executables
        path: |
          ${{ env.outputDirectory }}/**/*
        retention-days: 5

  sign:
    name: Sign app
    needs: build
    runs-on: windows-latest
    if:  ${{ inputs.perform_sign }} 
    environment: codeSign
    permissions:
      contents: read
      id-token: write
    steps:
    - name: 'Get .NET installed versions'
      run: dotnet --info

    - name: 'Install Sign CLI'
      run: dotnet tool install --tool-path ./sign --prerelease sign

    - name: 'Download Build Output'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: unsigned-executables
        path : ${{ env.outputDirectory }}

    - name: Authenticate to Azure
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        allow-no-subscriptions : true
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Sign
      shell: pwsh
      run: >
        ./sign/sign code azure-key-vault
        **/BlueskyVideoDownloader*.exe
        --base-directory ${{ env.outputDirectory }}
        --azure-key-vault-url "${{ secrets.AZURE_KEY_VAULT_URL }}"
        --azure-key-vault-certificate "${{ secrets.AZURE_KEY_VAULT_CERTIFICATE }}"
        --publisher-name "idunno.org"
        --description "Sign BlueskyVideoDownloader.exe"
        --description-url "https://github.com/blowdart/idunno.Bluesky.Utils"

    - name: Upload Signed Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: signed-artifacts
        path: |
          ${{ env.outputDirectory }}/**/BlueskyVideoDownloader*.exe
        retention-days: 7

  release:
    name: Release app
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: BlueskyVideoDownloader/${{needs.build.outputs.version_stamp}}

    if: ${{ inputs.perform_release }} 
    steps:

    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Stamping version
      run: |
        echo Stamping release as $tag

    - name: 'Checkout'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Tag Source
      uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1.7.2
      with:
        tag: ${{env.TAG}}

    - name: 'Download Signed Artifacts'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: signed-artifacts
        path : ${{ env.outputDirectory }}

    - name: Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
      with:
        fail_on_unmatched_files: true
        files: |
          ${{ env.outputDirectory }}/**/*.exe
        make_latest: true
        name: BlueskyVideoDownloader v${{needs.build.outputs.version_stamp}}
        tag_name: ${{env.TAG}}
